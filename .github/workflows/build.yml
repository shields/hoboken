name: CI

on:
  # push on all branches provides a check to gate merges without requiring a PR.
  # pull_request covers external fork contributions (requires maintainer approval).
  # Duplicate runs on branches with open PRs are an acceptable tradeoff.
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # bridge.test.ts invokes gitcalver, which requires full history.
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check

      # bun test --coverage runs unit tests; screenshot.test.ts skips here
      # because PLAYWRIGHT_IN_DOCKER is unset (it runs in the Docker step below).
      - name: Unit tests
        run: bun run test

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24

      - name: Integration test (WLED)
        run: bun run integration:wled
        env:
          VERBOSE: "1"

      # Screenshot test runs separately inside Docker for font determinism.
      - name: Screenshot test
        run: demo/docker-screenshot.sh test test/screenshot.test.ts

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # gitcalver requires full history to count commits per date.
          fetch-depth: 0

      - name: Compute version
        id: version
        run: echo "version=$(./scripts/gitcalver.sh --dirty -dev)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Container Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Immutable version tags only; no :latest to avoid ambiguity.
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          build-args: |
            GIT_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          # Only write cache from main to avoid evicting it with branch builds.
          cache-to: ${{ github.ref == 'refs/heads/main' && 'type=gha,mode=max' || '' }}
